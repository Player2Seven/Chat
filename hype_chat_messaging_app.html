
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e12;
    --surface: #16181f;
    --surface2: #1e2029;
    --surface3: #252733;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --accent3: #00d4aa;
    --text: #f0f0f8;
    --text2: #9496a8;
    --text3: #5a5c72;
    --online: #00d4aa;
    --away: #ffb347;
    --offline: #444;
    --border: rgba(255,255,255,0.07);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  .app { font-family: var(--font-body); background: var(--bg); color: var(--text); height: 600px; display: flex; flex-direction: column; border-radius: 16px; overflow: hidden; }

  /* AUTH SCREEN */
  .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; background: var(--bg); position: relative; overflow: hidden; }
  .auth-screen::before { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%); top: -100px; right: -100px; border-radius: 50%; }
  .auth-screen::after { content: ''; position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,107,157,0.1) 0%, transparent 70%); bottom: -80px; left: -80px; border-radius: 50%; }
  .auth-logo { font-family: var(--font-head); font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.25rem; position: relative; z-index: 1; }
  .auth-sub { color: var(--text2); font-size: 0.85rem; margin-bottom: 2.5rem; position: relative; z-index: 1; letter-spacing: 0.05em; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 340px; position: relative; z-index: 1; }
  .auth-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
  .auth-tab { flex: 1; padding: 0.5rem; text-align: center; border-radius: 8px; font-family: var(--font-body); font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all 0.2s; }
  .auth-tab.active { background: var(--accent); color: white; }
  .auth-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; margin-bottom: 0.75rem; outline: none; transition: border-color 0.2s; }
  .auth-input:focus { border-color: var(--accent); }
  .auth-btn { width: 100%; padding: 0.85rem; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; font-family: var(--font-head); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 0.5rem; }
  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:active { transform: scale(0.98); }
  .auth-msg { font-size: 0.8rem; color: var(--accent2); text-align: center; margin-top: 0.75rem; min-height: 1rem; }
  .quick-accounts { margin-top: 1.5rem; text-align: center; }
  .quick-label { font-size: 0.75rem; color: var(--text3); margin-bottom: 0.5rem; }
  .quick-btns { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
  .quick-btn { padding: 0.35rem 0.75rem; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN APP */
  .main-app { display: flex; height: 100%; }

  /* SIDEBAR */
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); }
  .my-profile { display: flex; align-items: center; gap: 0.625rem; }
  .my-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 0.8rem; font-weight: 700; flex-shrink: 0; position: relative; }
  .status-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); }
  .my-info { flex: 1; min-width: 0; }
  .my-name { font-family: var(--font-head); font-size: 0.85rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .my-status-text { font-size: 0.7rem; color: var(--text2); }
  .sidebar-search { padding: 0.75rem; }
  .search-box { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text); font-family: var(--font-body); font-size: 0.8rem; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .sidebar-section { padding: 0.5rem 0.75rem 0.25rem; font-size: 0.65rem; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  .new-btn { background: none; border: none; color: var(--accent); font-size: 1rem; cursor: pointer; line-height: 1; padding: 0; }
  .conv-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }
  .conv-list::-webkit-scrollbar { width: 3px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  .conv-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; cursor: pointer; transition: background 0.15s; border-radius: 0; position: relative; }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: var(--surface3); }
  .conv-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 0.75rem; font-weight: 700; flex-shrink: 0; position: relative; }
  .conv-avatar.group { border-radius: 12px; }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name { font-size: 0.83rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .conv-preview { font-size: 0.72rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .conv-time { font-size: 0.65rem; color: var(--text3); }
  .unread-badge { background: var(--accent); color: white; border-radius: 10px; padding: 1px 6px; font-size: 0.65rem; font-weight: 700; }
  .sidebar-footer { padding: 0.75rem; border-top: 1px solid var(--border); }
  .new-group-btn { width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px dashed var(--border); background: none; color: var(--text2); font-family: var(--font-body); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .new-group-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CHAT AREA */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .chat-header-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 0.75rem; font-weight: 700; flex-shrink: 0; position: relative; }
  .chat-header-avatar.group { border-radius: 10px; }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-family: var(--font-head); font-size: 0.9rem; font-weight: 700; }
  .chat-header-status { font-size: 0.72rem; color: var(--text2); }
  .header-actions { display: flex; gap: 0.5rem; }
  .header-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 0.4rem; border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
  .header-btn:hover { background: var(--surface2); color: var(--text); }
  .messages-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  .date-divider { text-align: center; font-size: 0.7rem; color: var(--text3); margin: 0.25rem 0; position: relative; }
  .date-divider::before, .date-divider::after { content: ''; position: absolute; top: 50%; width: calc(50% - 40px); height: 1px; background: var(--border); }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }
  .msg-group { display: flex; flex-direction: column; gap: 2px; }
  .msg-row { display: flex; align-items: flex-end; gap: 0.5rem; }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-sender-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 0.6rem; font-weight: 700; flex-shrink: 0; }
  .msg-row.mine .msg-sender-avatar { display: none; }
  .msg-bubble { max-width: 65%; padding: 0.5rem 0.8rem; border-radius: 18px; font-size: 0.875rem; line-height: 1.4; position: relative; }
  .msg-row.mine .msg-bubble { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; border-bottom-right-radius: 4px; }
  .msg-row:not(.mine) .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
  .msg-sender-name { font-size: 0.65rem; color: var(--text2); margin-bottom: 2px; padding-left: 0.75rem; }
  .msg-time { font-size: 0.6rem; color: var(--text3); margin-top: 2px; }
  .msg-row.mine .msg-time { text-align: right; }
  .typing-indicator { display: flex; align-items: center; gap: 0.5rem; padding: 0 0.75rem; }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .typing-text { font-size: 0.72rem; color: var(--text2); }
  .input-area { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .msg-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; padding: 0.625rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
  .msg-input:focus { border-color: var(--accent); }
  .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.9rem; transition: transform 0.15s; }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }

  /* EMPTY STATE */
  .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; color: var(--text3); }
  .empty-chat-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-chat-title { font-family: var(--font-head); font-size: 1rem; font-weight: 600; color: var(--text2); }
  .empty-chat-sub { font-size: 0.8rem; }

  /* NEW GROUP MODAL */
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; border-radius: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 300px; }
  .modal-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.625rem 0.875rem; color: var(--text); font-family: var(--font-body); font-size: 0.875rem; outline: none; margin-bottom: 0.75rem; }
  .modal-input:focus { border-color: var(--accent); }
  .member-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; max-height: 160px; overflow-y: auto; }
  .member-check { display: flex; align-items: center; gap: 0.625rem; padding: 0.4rem 0; cursor: pointer; }
  .member-check input { accent-color: var(--accent); width: 15px; height: 15px; }
  .member-check-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 0.65rem; font-weight: 700; }
  .member-check-name { font-size: 0.85rem; color: var(--text); }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .modal-cancel { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text2); font-family: var(--font-body); font-size: 0.8rem; cursor: pointer; }
  .modal-confirm { padding: 0.5rem 1rem; border-radius: 8px; border: none; background: var(--accent); color: white; font-family: var(--font-body); font-size: 0.8rem; cursor: pointer; font-weight: 500; }

  /* ONLINE STATUS BADGE */
  .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-online { background: var(--online); }
  .dot-away { background: var(--away); }
  .dot-offline { background: var(--offline); }

  /* COLORS */
  .c0 { background: #6c63ff22; color: #a89eff; }
  .c1 { background: #ff6b9d22; color: #ff9db8; }
  .c2 { background: #00d4aa22; color: #00d4aa; }
  .c3 { background: #ffb34722; color: #ffcc77; }
  .c4 { background: #60a5fa22; color: #93c5fd; }
  .c5 { background: #f4724022; color: #f87171; }

  .hidden { display: none !important; }
</style>

<div class="app" id="app">
  <!-- AUTH -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-logo">HypeChat</div>
    <div class="auth-sub">text different 🔥</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">sign in</button>
        <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">sign up</button>
      </div>
      <div id="loginForm">
        <input class="auth-input" type="text" id="loginUser" placeholder="username" />
        <input class="auth-input" type="password" id="loginPass" placeholder="password" />
        <button class="auth-btn" onclick="login()">let's go →</button>
        <div class="auth-msg" id="loginMsg"></div>
      </div>
      <div id="signupForm" class="hidden">
        <input class="auth-input" type="text" id="signupUser" placeholder="pick a username" />
        <input class="auth-input" type="text" id="signupDisplay" placeholder="display name" />
        <input class="auth-input" type="password" id="signupPass" placeholder="password" />
        <button class="auth-btn" onclick="signup()">create account →</button>
        <div class="auth-msg" id="signupMsg"></div>
      </div>
    </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="main-app hidden" id="mainApp">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="my-profile">
          <div class="my-avatar" id="myAvatarEl">
            <div class="status-dot dot-online"></div>
          </div>
          <div class="my-info">
            <div class="my-name" id="myNameEl"></div>
            <div class="my-status-text">● online</div>
          </div>
          <button style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.8rem;padding:4px;" onclick="logout()" title="sign out">⎋</button>
        </div>
      </div>
      <div class="sidebar-search">
        <input class="search-box" placeholder="🔍 search chats..." oninput="filterConvs(this.value)" />
      </div>
      <div class="sidebar-section">
        <span>messages</span>
        <button class="new-btn" onclick="openNewGroupModal()" title="new group chat">+</button>
      </div>
      <div class="conv-list" id="convList"></div>
      <div class="sidebar-footer">
        <button class="new-group-btn" onclick="openNewGroupModal()">+ new group chat</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-area">
      <div class="empty-chat" id="emptyChat">
        <div class="empty-chat-icon">💬</div>
        <div class="empty-chat-title">pick a chat to start</div>
        <div class="empty-chat-sub">your convos are on the left</div>
      </div>
      <div class="hidden" id="chatView" style="display:flex;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatHeaderName"></div>
            <div class="chat-header-status" id="chatHeaderStatus"></div>
          </div>
          <div class="header-actions">
            <button class="header-btn" title="info">ⓘ</button>
          </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="typing-indicator hidden" id="typingIndicator">
          <div class="typing-dots">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
          </div>
          <span class="typing-text" id="typingText"></span>
        </div>
        <div class="input-area">
          <input class="msg-input" id="msgInput" placeholder="send a message..." onkeydown="handleKey(event)" />
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal">
        <div class="modal-title">create group chat</div>
        <input class="modal-input" id="groupNameInput" placeholder="group name..." />
        <div class="member-list" id="memberList"></div>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="closeModal()">cancel</button>
          <button class="modal-confirm" onclick="createGroup()">create</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = ['c0','c1','c2','c3','c4','c5'];
const COLOR_MAP = {};

const DEMO_ACCOUNTS = {
  john: { pass: '1234', display: 'John', color: 'c0' },
  marcus: { pass: '1234', display: 'Marcus', color: 'c1' },
  kai: { pass: '1234', display: 'Kai', color: 'c2' },
  zara: { pass: '1234', display: 'Zara', color: 'c3' },
};

let state = {
  users: { ...DEMO_ACCOUNTS },
  currentUser: null,
  conversations: [
    {
      id: 'dm_john_marcus',
      type: 'dm',
      members: ['john','marcus'],
      messages: [
        { from: 'marcus', text: 'yo you tryna run 2K tonight?', time: '3:20 PM', date: 'Today' },
        { from: 'john', text: 'bet, hop on at 8', time: '3:22 PM', date: 'Today' },
        { from: 'marcus', text: 'lmk when ur ready', time: '3:24 PM', date: 'Today' },
      ]
    },
    {
      id: 'dm_john_kai',
      type: 'dm',
      members: ['john','kai'],
      messages: [
        { from: 'kai', text: 'you going to the tournament Saturday?', time: '1:10 PM', date: 'Today' },
        { from: 'john', text: 'yeah we in there 🏀', time: '1:15 PM', date: 'Today' },
      ]
    },
    {
      id: 'dm_john_zara',
      type: 'dm',
      members: ['john','zara'],
      messages: [
        { from: 'zara', text: 'did you see that new Drake track??', time: 'Yesterday' },
        { from: 'john', text: 'yeah it goes crazy', time: 'Yesterday' },
        { from: 'zara', text: 'fr fr', time: 'Yesterday' },
      ]
    },
    {
      id: 'group_squad',
      type: 'group',
      name: 'the squad 🔥',
      members: ['john','marcus','kai','zara'],
      messages: [
        { from: 'marcus', text: 'everyone on tonight??', time: '5:00 PM', date: 'Today' },
        { from: 'zara', text: 'yesss', time: '5:02 PM', date: 'Today' },
        { from: 'kai', text: 'I got you after 9', time: '5:05 PM', date: 'Today' },
        { from: 'john', text: 'W, squad games at 9 🎮', time: '5:07 PM', date: 'Today' },
      ]
    },
  ],
  onlineStatus: {
    john: 'online',
    marcus: 'online',
    kai: 'away',
    zara: 'offline',
  },
  unread: { dm_john_marcus: 0, dm_john_kai: 1, dm_john_zara: 0, group_squad: 2 },
  activeConvId: null,
};

function getInitials(name) {
  return name ? name.slice(0,2).toUpperCase() : '??';
}

function getUserColor(username) {
  if (!COLOR_MAP[username]) {
    const u = state.users[username];
    if (u && u.color) { COLOR_MAP[username] = u.color; }
    else {
      const keys = Object.keys(state.users);
      COLOR_MAP[username] = COLORS[keys.indexOf(username) % COLORS.length] || COLORS[0];
    }
  }
  return COLOR_MAP[username];
}

function getDisplayName(username) {
  return state.users[username] ? state.users[username].display : username;
}

function getStatusDot(status) {
  if (status === 'online') return '<span class="online-dot dot-online"></span>';
  if (status === 'away') return '<span class="online-dot dot-away"></span>';
  return '<span class="online-dot dot-offline"></span>';
}

function getStatusText(status) {
  if (status === 'online') return '🟢 online';
  if (status === 'away') return '🟡 away';
  return '⚫ offline';
}

function switchTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('signupTab').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').classList.toggle('hidden', tab!=='login');
  document.getElementById('signupForm').classList.toggle('hidden', tab!=='signup');
}

function login() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  if (!state.users[user]) { msg.textContent = 'user not found'; return; }
  if (state.users[user].pass !== pass) { msg.textContent = 'wrong password'; return; }
  enterApp(user);
}

function signup() {
  const user = document.getElementById('signupUser').value.trim().toLowerCase();
  const display = document.getElementById('signupDisplay').value.trim();
  const pass = document.getElementById('signupPass').value;
  const msg = document.getElementById('signupMsg');
  if (!user || !display || !pass) { msg.textContent = 'fill everything in'; return; }
  if (state.users[user]) { msg.textContent = 'username taken'; return; }
  state.users[user] = { pass, display, color: COLORS[Object.keys(state.users).length % COLORS.length] };
  state.onlineStatus[user] = 'online';
  enterApp(user);
}

function quickLogin(user) {
  state.onlineStatus[user] = 'online';
  enterApp(user);
}

function logout() {
  state.onlineStatus[state.currentUser] = 'offline';
  state.currentUser = null;
  state.activeConvId = null;
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginMsg').textContent = '';
}

function enterApp(username) {
  state.currentUser = username;
  state.onlineStatus[username] = 'online';
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('mainApp').style.display = 'flex';

  const color = getUserColor(username);
  const el = document.getElementById('myAvatarEl');
  el.className = `my-avatar ${color}`;
  el.innerHTML = `${getInitials(getDisplayName(username))}<div class="status-dot dot-online"></div>`;
  document.getElementById('myNameEl').textContent = getDisplayName(username);

  renderConvList();
  simulateOnlineChanges();
}

function getConvsForUser(user) {
  return state.conversations.filter(c => c.members.includes(user));
}

function getOtherMember(conv) {
  return conv.members.find(m => m !== state.currentUser);
}

function getConvName(conv) {
  if (conv.type === 'group') return conv.name;
  return getDisplayName(getOtherMember(conv));
}

function getConvAvatar(conv) {
  if (conv.type === 'group') {
    return { initials: conv.name.slice(0,2), color: 'c5', isGroup: true };
  }
  const other = getOtherMember(conv);
  return { initials: getInitials(getDisplayName(other)), color: getUserColor(other), isGroup: false };
}

function getLastMsg(conv) {
  const msgs = conv.messages;
  if (!msgs.length) return { text: 'no messages yet', time: '' };
  const last = msgs[msgs.length-1];
  const fromMe = last.from === state.currentUser;
  return { text: (fromMe ? 'you: ' : '') + last.text, time: last.time || last.date || '' };
}

function renderConvList(filter='') {
  const list = document.getElementById('convList');
  const convs = getConvsForUser(state.currentUser).filter(c => {
    if (!filter) return true;
    return getConvName(c).toLowerCase().includes(filter.toLowerCase());
  });
  list.innerHTML = convs.map(conv => {
    const av = getConvAvatar(conv);
    const last = getLastMsg(conv);
    const unread = state.unread[conv.id] || 0;
    const active = state.activeConvId === conv.id ? 'active' : '';
    let statusDot = '';
    if (conv.type === 'dm') {
      const other = getOtherMember(conv);
      const st = state.onlineStatus[other] || 'offline';
      statusDot = `<div class="status-dot ${st==='online'?'dot-online':st==='away'?'dot-away':'dot-offline'}"></div>`;
    }
    return `<div class="conv-item ${active}" onclick="openConv('${conv.id}')">
      <div class="conv-avatar ${av.isGroup?'group':''} ${av.color}">${av.initials}${statusDot}</div>
      <div class="conv-info">
        <div class="conv-name">${getConvName(conv)}</div>
        <div class="conv-preview">${last.text.length>32?last.text.slice(0,32)+'…':last.text}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${last.time}</div>
        ${unread ? `<div class="unread-badge">${unread}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterConvs(val) {
  renderConvList(val);
}

function openConv(convId) {
  state.activeConvId = convId;
  state.unread[convId] = 0;
  renderConvList();
  document.getElementById('emptyChat').classList.add('hidden');
  const chatView = document.getElementById('chatView');
  chatView.classList.remove('hidden');
  chatView.style.display = 'flex';
  renderChat(convId);
}

function renderChat(convId) {
  const conv = state.conversations.find(c => c.id === convId);
  if (!conv) return;

  // Header
  const av = getConvAvatar(conv);
  const headerAv = document.getElementById('chatHeaderAvatar');
  headerAv.className = `chat-header-avatar ${av.isGroup?'group':''} ${av.color}`;
  headerAv.textContent = av.initials;
  document.getElementById('chatHeaderName').textContent = getConvName(conv);

  if (conv.type === 'dm') {
    const other = getOtherMember(conv);
    const st = state.onlineStatus[other] || 'offline';
    document.getElementById('chatHeaderStatus').innerHTML = `${getStatusDot(st)} ${st}`;
  } else {
    const onlineCount = conv.members.filter(m => state.onlineStatus[m]==='online').length;
    document.getElementById('chatHeaderStatus').textContent = `${conv.members.length} members · ${onlineCount} online`;
  }

  // Messages
  const area = document.getElementById('messagesArea');
  let html = '';
  let lastDate = '';
  conv.messages.forEach(msg => {
    const date = msg.date || '';
    if (date && date !== lastDate) {
      html += `<div class="date-divider">${date}</div>`;
      lastDate = date;
    }
    const mine = msg.from === state.currentUser;
    const color = getUserColor(msg.from);
    const dname = getDisplayName(msg.from);
    html += `<div class="msg-group">
      ${!mine && conv.type==='group' ? `<div class="msg-sender-name">${dname}</div>` : ''}
      <div class="msg-row ${mine?'mine':''}">
        ${!mine ? `<div class="msg-sender-avatar ${color}">${getInitials(dname)}</div>` : ''}
        <div>
          <div class="msg-bubble">${msg.text}</div>
          <div class="msg-time">${msg.time||''}</div>
        </div>
      </div>
    </div>`;
  });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;

  document.getElementById('typingIndicator').classList.add('hidden');
}

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !state.activeConvId) return;
  input.value = '';

  const conv = state.conversations.find(c => c.id === state.activeConvId);
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  conv.messages.push({ from: state.currentUser, text, time, date: 'Today' });
  renderChat(state.activeConvId);
  renderConvList();

  // Simulate reply after delay
  const others = conv.members.filter(m => m !== state.currentUser && state.onlineStatus[m] === 'online');
  if (others.length) {
    const replier = others[Math.floor(Math.random()*others.length)];
    setTimeout(() => showTyping(replier), 800 + Math.random()*600);
  }
}

const REPLIES = [
  'no cap 🔥', 'bet', 'W', 'lol facts', 'bro what 😭', 'frfr', 'say less', 'on god',
  'aight', 'nah that\'s crazy', 'bro is cooked', 'W rizz', 'actually lowkey right', 'gz',
  'let\'s gooo', 'sheesh', 'bro really said that 💀', 'mid honestly', 'big facts', 'no shot'
];

function showTyping(from) {
  if (state.activeConvId === null) return;
  const conv = state.conversations.find(c => c.id === state.activeConvId);
  if (!conv || !conv.members.includes(from)) return;
  const el = document.getElementById('typingIndicator');
  document.getElementById('typingText').textContent = `${getDisplayName(from)} is typing...`;
  el.classList.remove('hidden');
  document.getElementById('messagesArea').scrollTop = 99999;
  setTimeout(() => {
    el.classList.add('hidden');
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    conv.messages.push({ from, text: REPLIES[Math.floor(Math.random()*REPLIES.length)], time, date: 'Today' });
    if (state.activeConvId === conv.id) renderChat(conv.id);
    renderConvList();
  }, 1200 + Math.random()*800);
}

function openNewGroupModal() {
  const modal = document.getElementById('modalOverlay');
  modal.classList.remove('hidden');
  document.getElementById('groupNameInput').value = '';
  const friends = Object.keys(state.users).filter(u => u !== state.currentUser);
  document.getElementById('memberList').innerHTML = friends.map(u => {
    const color = getUserColor(u);
    return `<label class="member-check">
      <input type="checkbox" value="${u}" />
      <div class="member-check-avatar ${color}">${getInitials(getDisplayName(u))}</div>
      <span class="member-check-name">${getDisplayName(u)}</span>
      ${getStatusDot(state.onlineStatus[u] || 'offline')}
    </label>`;
  }).join('');
  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function createGroup() {
  const name = document.getElementById('groupNameInput').value.trim();
  if (!name) { return; }
  const checked = [...document.querySelectorAll('#memberList input:checked')].map(i => i.value);
  if (!checked.length) { return; }
  const members = [state.currentUser, ...checked];
  const id = 'group_' + Date.now();
  state.conversations.unshift({ id, type: 'group', name, members, messages: [] });
  state.unread[id] = 0;
  closeModal();
  renderConvList();
  openConv(id);
}

function simulateOnlineChanges() {
  setInterval(() => {
    const users = Object.keys(state.users).filter(u => u !== state.currentUser);
    const target = users[Math.floor(Math.random()*users.length)];
    const statuses = ['online','online','online','away','offline'];
    const newStatus = statuses[Math.floor(Math.random()*statuses.length)];
    state.onlineStatus[target] = newStatus;
    renderConvList();
    if (state.activeConvId) {
      const conv = state.conversations.find(c => c.id === state.activeConvId);
      if (conv && conv.type === 'dm' && getOtherMember(conv) === target) {
        document.getElementById('chatHeaderStatus').innerHTML = `${getStatusDot(newStatus)} ${newStatus}`;
      }
    }
  }, 8000 + Math.random()*7000);
}
</script>
